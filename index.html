<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCL Ranking</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 35%),
        radial-gradient(circle at right, rgba(168,85,247,0.16), transparent 30%),
        linear-gradient(180deg, #020617 0%, #0f172a 55%, #111827 100%);
      color: #e5e7eb;
      min-height: 100vh;
      padding: 32px 16px 60px;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }
    .hero {
      text-align: center;
      margin-bottom: 28px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 0.06em;
      color: #f8fafc;
      text-shadow: 0 0 18px rgba(255,255,255,0.12);
    }
    .hero p {
      margin: 0;
      color: #94a3b8;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }
    .card {
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }
    .card h2 {
      margin: 0 0 14px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }
    .sub {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 14px;
    }
    .list {
      display: grid;
      gap: 10px;
    }
    .row {
      display: grid;
      grid-template-columns: 74px 1fr 72px;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(30, 41, 59, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }
    .rank {
      font-weight: 800;
      font-size: 18px;
      text-align: center;
      border-radius: 12px;
      padding: 8px 6px;
      background: rgba(255,255,255,0.05);
    }
    .name {
      font-weight: 700;
      font-size: 16px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .id {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pt {
      text-align: right;
      font-weight: 800;
      font-size: 18px;
      color: #f8fafc;
    }
    .pt span {
      display: block;
      font-size: 11px;
      color: #94a3b8;
      font-weight: 500;
      margin-top: 2px;
    }
    .gold {
      background: linear-gradient(135deg, #fef08a, #f59e0b);
      color: #111827;
      box-shadow: 0 0 18px rgba(245, 158, 11, 0.35);
    }
    .silver {
      background: linear-gradient(135deg, #f8fafc, #94a3b8);
      color: #111827;
      box-shadow: 0 0 18px rgba(148, 163, 184, 0.25);
    }
    .bronze {
      background: linear-gradient(135deg, #fdba74, #b45309);
      color: #111827;
      box-shadow: 0 0 18px rgba(180, 83, 9, 0.25);
    }
    .normal-rank {
      background: linear-gradient(135deg, rgba(59,130,246,0.22), rgba(168,85,247,0.2));
      color: #e5e7eb;
    }
    .loading, .error {
      padding: 20px;
      text-align: center;
      color: #94a3b8;
    }
    .error { color: #fca5a5; }
    .footer {
      text-align: center;
      margin-top: 28px;
      color: #64748b;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>CCL RANKING</h1>
      <p>週間活動ランキング / 総合ランキング</p>
    </div>

    <div class="grid">
      <section class="card">
        <h2>週間ランキング</h2>
        <div class="sub">今週の活動ポイント順位</div>
        <div id="weeklyList" class="list">
          <div class="loading">読み込み中...</div>
        </div>
      </section>

      <section class="card">
        <h2>総合ランキング</h2>
        <div class="sub">累計ポイント順位</div>
        <div id="totalList" class="list">
          <div class="loading">読み込み中...</div>
        </div>
      </section>
    </div>

    <div class="footer">CCL Community Ranking</div>
  </div>

  <script>
    const CSV_URL = "ここにCSVのURLを貼る";

    async function loadCSV() {
      const weeklyList = document.getElementById("weeklyList");
      const totalList = document.getElementById("totalList");

      try {
        const res = await fetch(CSV_URL);
        if (!res.ok) throw new Error("CSV取得失敗");
        const text = await res.text();

        const rows = text.trim().split("\n").map(row =>
          row.split(",").map(cell => cell.replace(/^"|"$/g, "").trim())
        );

        if (rows.length < 2) throw new Error("データなし");

        const weeklyRows = [];
        const totalRows = [];

        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];

          const weeklyRank = row[0];
          const weeklyMemberId = row[1];
          const weeklyName = row[2];
          const weeklyPt = row[3];

          const totalRank = row[6];
          const totalMemberId = row[7];
          const totalName = row[8];
          const totalPt = row[9];

          if (weeklyRank) {
            weeklyRows.push({
              rank: weeklyRank,
              memberId: weeklyMemberId,
              name: weeklyName,
              pt: weeklyPt
            });
          }

          if (totalRank) {
            totalRows.push({
              rank: totalRank,
              memberId: totalMemberId,
              name: totalName,
              pt: totalPt
            });
          }
        }

        renderList(weeklyList, weeklyRows);
        renderList(totalList, totalRows);

      } catch (e) {
        weeklyList.innerHTML = `<div class="error">週間ランキングの読み込みに失敗しました</div>`;
        totalList.innerHTML = `<div class="error">総合ランキングの読み込みに失敗しました</div>`;
        console.error(e);
      }
    }

    function rankClass(rank) {
      const n = Number(rank);
      if (n === 1) return "gold";
      if (n === 2) return "silver";
      if (n === 3) return "bronze";
      return "normal-rank";
    }

    function renderList(target, data) {
      if (!data.length) {
        target.innerHTML = `<div class="loading">表示できるデータがありません</div>`;
        return;
      }

      target.innerHTML = data.map(item => `
        <div class="row">
          <div class="rank ${rankClass(item.rank)}">${item.rank}位</div>
          <div>
            <div class="name">${escapeHtml(item.name || "-")}</div>
            <div class="id">${escapeHtml(item.memberId || "")}</div>
          </div>
          <div class="pt">${escapeHtml(item.pt || "0")}<span>pt</span></div>
        </div>
      `).join("");
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadCSV();
  </script>
</body>
</html>
